<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - zaawansowane techniki makijazu</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #121212; /* Ciemne tło */
            color: #e0e0e0; /* Jasny tekst */
        }
        .container {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            max-width: 800px;
            margin: 20px auto;
            border: 1px solid #333;
        }
        h1 {
            color: #f48fb1; /* Różowy odcień pasujący do estetyki */
            text-align: center;
            margin-bottom: 20px;
            font-size: 2em;
        }
        /* --- SEKCJA STATYSTYK --- */
        .stats-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
            font-size: 1.1em;
        }
        .status-bar {
            color: #aaa;
        }
        .live-score {
            font-weight: bold;
            color: #4caf50; /* Zielony kolor dla wyniku */
        }
        
        .question-section {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }
        .question-section p {
            font-size: 1.4em;
            margin-bottom: 20px;
            font-weight: 600;
            line-height: 1.4;
            color: #ffffff;
        }
        .options label {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            cursor: pointer;
            padding: 15px;
            border: 2px solid #333;
            border-radius: 8px;
            transition: all 0.2s ease;
            background-color: #2c2c2c;
            color: #e0e0e0;
        }
        .options label:hover {
            background-color: #383838;
            border-color: #555;
        }
        .options input[type="radio"] {
            margin-right: 15px;
            transform: scale(1.3);
            cursor: pointer;
            accent-color: #f48fb1;
        }
        .button-group {
            text-align: center;
            margin-top: 30px;
        }
        .button-group button {
            padding: 12px 30px;
            margin: 0 10px;
            font-size: 1.1em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.3s;
            font-weight: bold;
        }
        .button-group button:active {
            transform: scale(0.98);
        }
        #check-button {
            background-color: #c2185b;
            color: white;
        }
        #check-button:hover {
            background-color: #ad1457;
        }
        #next-button {
            background-color: #2e7d32;
            color: white;
            display: none;
        }
        #next-button:hover {
            background-color: #1b5e20;
        }
        #result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
            font-size: 1.2em;
            display: none;
        }
        .correct-msg {
            background-color: #1b5e20;
            color: #ffffff;
            border: 1px solid #2e7d32;
        }
        .incorrect-msg {
            background-color: #b71c1c;
            color: #ffffff;
            border: 1px solid #c62828;
        }
        .final-score {
            font-size: 1.5em;
            color: #f48fb1;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Test Wiedzy: Zaawansowane techniki makijazu</h1>
        
        <div class="stats-container">
            <div id="status-bar" class="status-bar">Ładowanie...</div>
            <div id="live-score" class="live-score">Wynik: 0/0 (0%)</div>
        </div>
        
        <div class="question-section">
            <p id="question"></p>
            <div class="options" id="options">
                </div>
        </div>

        <div class="button-group">
            <button id="check-button">Sprawdź</button>
            <button id="next-button">Następne pytanie</button>
            <button id="restart-button" style="display: none; background-color: #ff9800; color: white;">Rozpocznij od nowa</button>
        </div>

        <div id="result"></div>
    </div>

    <script>
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }
        
        const rawQuestions = [
    {
        question: "Makijaż ślubny łączy w sobie cechy makijażu:",
        options: [
            { text: "Dziennego", isCorrect: false },
            { text: "Wieczorowego", isCorrect: false },
            { text: "Fotograficznego", isCorrect: false },
            { text: "Wszystkie odp. Są poprawne", isCorrect: true }
        ]
    },
    {
        question: "Kolor roku 2022 to:",
        options: [
            { text: "Kolarowy", isCorrect: false },
            { text: "Very Peri", isCorrect: true },
            { text: "Żółć i szarość", isCorrect: false },
            { text: "Bakłażan", isCorrect: false }
        ]
    },
    {
        question: "Makijaż biżuteryjny czerpiący z filozofii haute couture powinien mieć charakter :",
        options: [
            { text: "Upiększający", isCorrect: true },
            { text: "Przesadnie strojny", isCorrect: false },
            { text: "Zachowawczy", isCorrect: false },
            { text: "Kiczowaty", isCorrect: false }
        ]
    },
    {
        question: "Cechy makijażu artystycznego to:",
        options: [
            { text: "Teatralność", isCorrect: false },
            { text: "Nowoczesne techniki aplikacji", isCorrect: false },
            { text: "Wyraziste barwy", isCorrect: false },
            { text: "Wszystkie odpowiedzi są poprawne", isCorrect: true }
        ]
    },
    {
        question: "Makijaż brokatowy czerpie z makijażu",
        options: [
            { text: "Fotograficznego", isCorrect: false },
            { text: "Epokowego", isCorrect: false },
            { text: "Estradowego", isCorrect: true },
            { text: "Żadna odpowiedz nie jest poprawna", isCorrect: false }
        ]
    },
    {
        question: "Makijaż który powinien uwzględnić filozofię marki i grupę docelową to:",
        options: [
            { text: "Makijaż reklamowy", isCorrect: true },
            { text: "Makijaż reprezentacyjny", isCorrect: false },
            { text: "Makijaż rekultywujący", isCorrect: false },
            { text: "Wszystkie odpowiedzi są poprawne", isCorrect: false }
        ]
    },
    {
        question: "W makijażu artystycznym można sobie pozwolić na nowoczesne podejście do:",
        options: [
            { text: "Modelarzu", isCorrect: false },
            { text: "Kształtu oka", isCorrect: false },
            { text: "Proporcji twarzy", isCorrect: false },
            { text: "Wszystkie odpowiedzi są poprawne", isCorrect: true }
        ]
    },
    {
        question: "Teatralność w makijażu artystycznym oznacza:",
        options: [
            { text: "Subtelność", isCorrect: false },
            { text: "Dbałość o detale", isCorrect: false },
            { text: "Wyrazistość", isCorrect: true },
            { text: "Minimalizm", isCorrect: false }
        ]
    },
    {
        question: "Aby właściwie wykonać makijaż fotograficzny najważniejsze jest:",
        options: [
            { text: "Przeznaczenie makijażu", isCorrect: true },
            { text: "Poznanie modelki", isCorrect: false },
            { text: "Oglądanie sesji zdjęciowej", isCorrect: false },
            { text: "Przybycie na czas", isCorrect: false }
        ]
    },
    {
        question: "W makijażu artystycznym istnieje możliwość kreowania go za pomocą:",
        options: [
            { text: "Sztucznych rzęs", isCorrect: false },
            { text: "Tłustego podłoża", isCorrect: false },
            { text: "Akcentów kolorystycznych", isCorrect: false },
            { text: "Wszystkie odpowiedzi są poprawne", isCorrect: true }
        ]
    },
    {
        question: "Face paiting może być wykonywany technikami:",
        options: [
            { text: "Pędzla i gąbki", isCorrect: false },
            { text: "Airbrush", isCorrect: false },
            { text: "Odpowiedzi A i B są poprawne", isCorrect: true },
            { text: "Żadna odpowiedz nie jest poprawna", isCorrect: false }
        ]
    },
    {
        question: "Makijaż prezentowany w pismach poradnikowych powinien być:",
        options: [
            { text: "Utrzymywany w klasycznej konwencji", isCorrect: true },
            { text: "Utrzymywany w nowoczesnej konwencji", isCorrect: false },
            { text: "Utrzymywany w ciepłych barwach", isCorrect: false },
            { text: "Utrzymywany w chłodnych barwach", isCorrect: false }
        ]
    },
    {
        question: "Rodzaje makijażu artystycznego to:",
        options: [
            { text: "Makijaż fashion", isCorrect: false },
            { text: "Face painting", isCorrect: false },
            { text: "Makijaż biżuteryjny", isCorrect: false },
            { text: "Wszystkie odpowiedzi są poprawne", isCorrect: true }
        ]
    },
    {
        question: "Przy oświetleniu cieplnym makijaż powinien być:",
        options: [
            { text: "Neutralny", isCorrect: false },
            { text: "W chłodnych tonach", isCorrect: false },
            { text: "W ciepłych tonach", isCorrect: true },
            { text: "Żadna odpowiedz nie jest poprawna", isCorrect: false }
        ]
    },
    {
        question: "Istotą makijażu reklamowego jest:",
        options: [
            { text: "Zaprezentowanie linii kosmetyków", isCorrect: true },
            { text: "Nieuwzględnienie grupy docelowej", isCorrect: false },
            { text: "Chłodna tonacja kolorystyczna", isCorrect: false },
            { text: "Wszystkie odpowiedzi są poprawne", isCorrect: false }
        ]
    },
    {
        question: "Makijaż fashion czerpie z :",
        options: [
            { text: "Charakteryzacji", isCorrect: false },
            { text: "Makijażu epokowego", isCorrect: false },
            { text: "Makijażu estradowego", isCorrect: false },
            { text: "Wszystkie odp są poprawne", isCorrect: true }
        ]
    },
    {
        question: "W świetle ostrym bezpośrednio skierowanym:",
        options: [
            { text: "Dobrze wyjdzie portret macho", isCorrect: false },
            { text: "Należy uwzględnić precyzyjne modelowanie", isCorrect: false },
            { text: "Odpowiedzi A i B są poprawne", isCorrect: true },
            { text: "Wychodzą idealne portrety kobiece", isCorrect: false }
        ]
    },
    {
        question: "Makijaż najczęściej spotykany jest w fotografii reklamowej, szczególnie w przypadku produktów pielęgnacyjnych to:",
        options: [
            { text: "Make-up no make-up", isCorrect: true },
            { text: "Makijaż epokowy", isCorrect: false },
            { text: "Makijaż Beauty", isCorrect: false },
            { text: "Makijaż airbrush", isCorrect: false }
        ]
    },
    {
        question: "Światło białe – neutralne ma temperaturę:",
        options: [
            { text: "3000 K", isCorrect: false },
            { text: "4500-5000 K", isCorrect: true },
            { text: "6000-8000K", isCorrect: false },
            { text: "10000K", isCorrect: false }
        ]
    },
    {
        question: "Przy oświetleniu chłodnym makijaż powinien być:",
        options: [
            { text: "Ekstrawagancki", isCorrect: false },
            { text: "W chłodnych tonach", isCorrect: true },
            { text: "W ciepłych tonach", isCorrect: false }
        ]
    }
];

        // Zmienne stanu
        let questions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let shuffleNeeded = false; // To change if you want to shuffle the questions

        const questionElement = document.getElementById('question');
        const optionsElement = document.getElementById('options');
        const checkButton = document.getElementById('check-button');
        const nextButton = document.getElementById('next-button');
        const restartButton = document.getElementById('restart-button');
        const resultElement = document.getElementById('result');
        const statusBar = document.getElementById('status-bar');
        const liveScoreElement = document.getElementById('live-score');

        function initTest() {
            // Resetujemy stan
            questions = shuffleArray([...rawQuestions]); // Tasujemy pytania
            currentQuestionIndex = 0;
            score = 0;
            
            // Resetujemy widok
            checkButton.style.display = 'inline-block';
            nextButton.style.display = 'none';
            restartButton.style.display = 'none';
            resultElement.style.display = 'none';
            liveScoreElement.textContent = "Wynik: 0/0 (0%)";
            
            loadNewQuestion();
        }

        function loadNewQuestion() {
            if (currentQuestionIndex >= questions.length) {
                showFinalResult();
                return;
            }

            const currentQuestion = questions[currentQuestionIndex];
            statusBar.textContent = `Pytanie ${currentQuestionIndex + 1} z ${questions.length}`;
            questionElement.textContent = currentQuestion.question;
            optionsElement.innerHTML = '';
            resultElement.style.display = 'none';
            resultElement.className = '';

            if (shuffleNeeded) {
                currentQuestion.options = shuffleArray([...currentQuestion.options]);
            }
            else {
                currentQuestion.options = [...currentQuestion.options];
            }

            currentQuestion.options.forEach((option, index) => {
                const label = document.createElement('label');
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = 'answer';
                radio.value = option.isCorrect ? 'correct' : 'incorrect';
                
                label.appendChild(radio);
                label.appendChild(document.createTextNode(option.text));
                optionsElement.appendChild(label);
            });

            checkButton.style.display = 'inline-block';
            nextButton.style.display = 'none';
        }

        function checkAnswer() {
            const selectedOption = document.querySelector('input[name="answer"]:checked');

            if (!selectedOption) {
                alert("Proszę zaznaczyć odpowiedź!");
                return;
            }

            const isCorrect = selectedOption.value === 'correct';
            const allRadios = optionsElement.querySelectorAll('input[type="radio"]');

            if (isCorrect) {
                score++;
            }

            // Aktualizacja wyniku na bieżąco
            const questionsAnswered = currentQuestionIndex + 1;
            const percentage = Math.round((score / questionsAnswered) * 100);
            liveScoreElement.textContent = `Wynik: ${score}/${questionsAnswered} (${percentage}%)`;

            allRadios.forEach(radio => {
                const parentLabel = radio.parentElement;
                radio.disabled = true;
                
                if (radio.value === 'correct') {
                    parentLabel.style.backgroundColor = '#1b5e20';
                    parentLabel.style.borderColor = '#2e7d32';
                    parentLabel.style.color = '#ffffff'; 
                } else if (radio.checked && radio.value === 'incorrect') {
                    parentLabel.style.backgroundColor = '#b71c1c';
                    parentLabel.style.borderColor = '#c62828';
                    parentLabel.style.color = '#ffffff'; 
                }
            });

            resultElement.style.display = 'block';
            if (isCorrect) {
                resultElement.textContent = "Poprawna odpowiedź!";
                resultElement.className = 'correct-msg';
            } else {
                resultElement.textContent = "Niepoprawna odpowiedź.";
                resultElement.className = 'incorrect-msg';
            }

            checkButton.style.display = 'none';
            nextButton.style.display = 'inline-block';
        }

        function showFinalResult() {
            questionElement.textContent = "Koniec testu!";
            optionsElement.innerHTML = `<div class="final-score">Twój wynik końcowy: ${score} na ${questions.length} punktów.</div>`;
            
            const percentage = Math.round((score / questions.length) * 100);
            optionsElement.innerHTML += `<p>Skuteczność: ${percentage}%</p>`;

            if (percentage >= 80) {
                optionsElement.innerHTML += `<p style="color: #4caf50; font-weight: bold;">Świetny wynik! Gratulacje.</p>`;
            } else if (percentage >= 50) {
                optionsElement.innerHTML += `<p style="color: #ff9800; font-weight: bold;">Nieźle, ale warto powtórzyć materiał.</p>`;
            } else {
                optionsElement.innerHTML += `<p style="color: #f44336; font-weight: bold;">Musisz jeszcze poćwiczyć.</p>`;
            }

            checkButton.style.display = 'none';
            nextButton.style.display = 'none';
            resultElement.textContent = '';
            statusBar.textContent = '';
            liveScoreElement.textContent = ''; // Czyścimy pasek live score na końcu
            
            restartButton.style.display = 'inline-block';
        }

        checkButton.addEventListener('click', checkAnswer);
        nextButton.addEventListener('click', () => {
            currentQuestionIndex++;
            loadNewQuestion();
        });
        restartButton.addEventListener('click', initTest);

        document.addEventListener('DOMContentLoaded', initTest);
    </script>
</body>
</html>
