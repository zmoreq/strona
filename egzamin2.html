<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - Niefarmakologiczne metody leczenia</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #121212; /* Ciemne tło */
            color: #e0e0e0; /* Jasny tekst */
        }
        .container {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            max-width: 800px;
            margin: 20px auto;
            border: 1px solid #333;
        }
        h1 {
            color: #f48fb1; /* Różowy odcień pasujący do estetyki */
            text-align: center;
            margin-bottom: 20px;
            font-size: 2em;
        }
        /* --- SEKCJA STATYSTYK --- */
        .stats-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
            font-size: 1.1em;
        }
        .status-bar {
            color: #aaa;
        }
        .live-score {
            font-weight: bold;
            color: #4caf50; /* Zielony kolor dla wyniku */
        }
        
        .question-section {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }
        .question-section p {
            font-size: 1.4em;
            margin-bottom: 20px;
            font-weight: 600;
            line-height: 1.4;
            color: #ffffff;
        }
        .options label {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            cursor: pointer;
            padding: 15px;
            border: 2px solid #333;
            border-radius: 8px;
            transition: all 0.2s ease;
            background-color: #2c2c2c;
            color: #e0e0e0;
        }
        .options label:hover {
            background-color: #383838;
            border-color: #555;
        }
        .options input[type="radio"] {
            margin-right: 15px;
            transform: scale(1.3);
            cursor: pointer;
            accent-color: #f48fb1;
        }
        .button-group {
            text-align: center;
            margin-top: 30px;
        }
        .button-group button {
            padding: 12px 30px;
            margin: 0 10px;
            font-size: 1.1em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.3s;
            font-weight: bold;
        }
        .button-group button:active {
            transform: scale(0.98);
        }
        #check-button {
            background-color: #c2185b;
            color: white;
        }
        #check-button:hover {
            background-color: #ad1457;
        }
        #next-button {
            background-color: #2e7d32;
            color: white;
            display: none;
        }
        #next-button:hover {
            background-color: #1b5e20;
        }
        #result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
            font-size: 1.2em;
            display: none;
        }
        .correct-msg {
            background-color: #1b5e20;
            color: #ffffff;
            border: 1px solid #2e7d32;
        }
        .incorrect-msg {
            background-color: #b71c1c;
            color: #ffffff;
            border: 1px solid #c62828;
        }
        .final-score {
            font-size: 1.5em;
            color: #f48fb1;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Test Wiedzy: Niefarmakologiczne metody leczenia</h1>
        
        <div class="stats-container">
            <div id="status-bar" class="status-bar">Ładowanie...</div>
            <div id="live-score" class="live-score">Wynik: 0/0 (0%)</div>
        </div>
        
        <div class="question-section">
            <p id="question"></p>
            <div class="options" id="options">
                </div>
        </div>

        <div class="button-group">
            <button id="check-button">Sprawdź</button>
            <button id="next-button">Następne pytanie</button>
            <button id="restart-button" style="display: none; background-color: #ff9800; color: white;">Rozpocznij od nowa</button>
        </div>

        <div id="result"></div>
    </div>

    <script>
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }
const rawQuestions = [
            {
                question: "Ile wynosi temperatura wrzenia podtlenku azotu?",
                options: [
                    { text: "-195,8°C", isCorrect: false },
                    { text: "-88°C", isCorrect: true },
                    { text: "-78,9°C", isCorrect: false },
                    { text: "-40,8°C", isCorrect: false }
                ]
            },
            {
                question: "Które z promieni UV są najbardziej szkodliwe dla skóry?",
                options: [
                    { text: "UVB (290-320 nm)", isCorrect: false },
                    { text: "UVA (320-400nm)", isCorrect: true },
                    { text: "UVC (200-290 nm)", isCorrect: false },
                    { text: "Wszystkie", isCorrect: false }
                ]
            },
            {
                question: "Który z laserów pełni rolę skalpela chirurgicznego?",
                options: [
                    { text: "Neodymowo-yagowy", isCorrect: false },
                    { text: "Aleksandrytowy", isCorrect: false },
                    { text: "CO2", isCorrect: true },
                    { text: "Erbowo-yagowy", isCorrect: false }
                ]
            },
            {
                question: "Kąpiele siarczkowo-siarkowodorowe znajdują zastosowanie w:",
                options: [
                    { text: "Łuszczycy", isCorrect: true },
                    { text: "Trądziku różowatym", isCorrect: false },
                    { text: "Pokrzywce", isCorrect: false },
                    { text: "Zaburzenia ukrwienia naczyń krwionośnych w cukrzycy", isCorrect: false }
                ]
            },
            {
                question: "Efekt działania alfa-hydroksykwasów zależy między innymi od:",
                options: [
                    { text: "Jego stężenia", isCorrect: false },
                    { text: "Biodostępności", isCorrect: false },
                    { text: "Czasu ekspozycji", isCorrect: false },
                    { text: "Od wszystkich powyższych czynników", isCorrect: true }
                ]
            },
            {
                question: "W których chorobach skóry ostrożnie powinny być stosowane zabiegi medycyny estetycznej?",
                options: [
                    { text: "Łuszczyca", isCorrect: false },
                    { text: "Liszaj płaski", isCorrect: false },
                    { text: "Brodawki płaskie młodocianych", isCorrect: false },
                    { text: "We wszystkich wymienionych", isCorrect: true }
                ]
            },
            {
                question: "W leczeniu przebarwień nie znajduje zastosowania:",
                options: [
                    { text: "Kwas migdałowy", isCorrect: false },
                    { text: "Kwas kojowy", isCorrect: false },
                    { text: "Kwas salicylowy", isCorrect: true },
                    { text: "Kwas azelainowy", isCorrect: false }
                ]
            },
            {
                question: "Kriopeeling to:",
                options: [
                    { text: "Peeling chemiczny", isCorrect: false },
                    { text: "Peeling fizyczny", isCorrect: true },
                    { text: "Peeling mechaniczny", isCorrect: false },
                    { text: "Peeling złożony", isCorrect: false }
                ]
            },
            {
                question: "Które dane dotyczące cellulitu nie są prawdziwe?",
                options: [
                    { text: "Częściej dotyczy kobiet", isCorrect: false },
                    { text: "Częściej dotyczy rasy kaukaskiej", isCorrect: false },
                    { text: "Ryzyko rozwoju rośnie z wiekiem", isCorrect: false },
                    { text: "Nigdy nie występuje u mężczyzn", isCorrect: true }
                ]
            },
            {
                question: "Które z cech są charakterystyczne dla znamienia atypowego?",
                options: [
                    { text: "Asymetryczne", isCorrect: false },
                    { text: "Nieregularna struktura i nierównomierny rozkład barwnika", isCorrect: false },
                    { text: "Średnica >1 mm", isCorrect: false },
                    { text: "Wszystkie wymienione cechy", isCorrect: true }
                ]
            },
            {
                question: "Które kąpiele lecznicze znajdują zastosowanie w chorobach łojotokowych?",
                options: [
                    { text: "Kąpiele siarczkowo-siarkowodorowe", isCorrect: true },
                    { text: "Radonowe", isCorrect: false },
                    { text: "Kwasowęglowe", isCorrect: false },
                    { text: "Solankowe", isCorrect: false }
                ]
            },
            {
                question: "Temperatura wrzenia ciekłego azotu używanego podczas zabiegów wynosi:",
                options: [
                    { text: "-195,8°C", isCorrect: true },
                    { text: "-88°C", isCorrect: false },
                    { text: "-78,9°C", isCorrect: false },
                    { text: "-58°C", isCorrect: false }
                ]
            },
            {
                question: "Cząsteczkami absorbującymi, czyli chromoforami dla światła laserowego są?",
                options: [
                    { text: "Hemoglobina", isCorrect: false },
                    { text: "Melanina", isCorrect: false },
                    { text: "Kolagen", isCorrect: false },
                    { text: "Wszystkie wyżej wymienione", isCorrect: true }
                ]
            },
            {
                question: "Które z zabiegów wykorzystywane są w cellulicie?",
                options: [
                    { text: "Radiofrekwencja", isCorrect: false },
                    { text: "Endermologia", isCorrect: false },
                    { text: "Mezoterapia", isCorrect: false },
                    { text: "Wszystkie wyżej wymienione zabiegi", isCorrect: true }
                ]
            },
            {
                question: "Która z podanych cech kwasu glikolowego jest nieprawdziwa?",
                options: [
                    { text: "Jest otrzymywany z trzciny cukrowej", isCorrect: false },
                    { text: "Ma najdłuższy łańcuch węglowy", isCorrect: true },
                    { text: "Jest nietoksyczny", isCorrect: false },
                    { text: "Wygładza naskórek, aktywuje syntezę kolagenu, elastyny i glikozoaminoglikanów", isCorrect: false }
                ]
            }
        ];
        // Zmienne stanu
        let questions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let shuffleNeeded = false; // To change if you want to shuffle the questions

        const questionElement = document.getElementById('question');
        const optionsElement = document.getElementById('options');
        const checkButton = document.getElementById('check-button');
        const nextButton = document.getElementById('next-button');
        const restartButton = document.getElementById('restart-button');
        const resultElement = document.getElementById('result');
        const statusBar = document.getElementById('status-bar');
        const liveScoreElement = document.getElementById('live-score');

        function initTest() {
            // Resetujemy stan
            questions = shuffleArray([...rawQuestions]); // Tasujemy pytania
            currentQuestionIndex = 0;
            score = 0;
            
            // Resetujemy widok
            checkButton.style.display = 'inline-block';
            nextButton.style.display = 'none';
            restartButton.style.display = 'none';
            resultElement.style.display = 'none';
            liveScoreElement.textContent = "Wynik: 0/0 (0%)";
            
            loadNewQuestion();
        }

        function loadNewQuestion() {
            if (currentQuestionIndex >= questions.length) {
                showFinalResult();
                return;
            }

            const currentQuestion = questions[currentQuestionIndex];
            statusBar.textContent = `Pytanie ${currentQuestionIndex + 1} z ${questions.length}`;
            questionElement.textContent = currentQuestion.question;
            optionsElement.innerHTML = '';
            resultElement.style.display = 'none';
            resultElement.className = '';

            if (shuffleNeeded) {
                currentQuestion.options = shuffleArray([...currentQuestion.options]);
            }
            else {
                currentQuestion.options = [...currentQuestion.options];
            }

            currentQuestion.options.forEach((option, index) => {
                const label = document.createElement('label');
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = 'answer';
                radio.value = option.isCorrect ? 'correct' : 'incorrect';
                
                label.appendChild(radio);
                label.appendChild(document.createTextNode(option.text));
                optionsElement.appendChild(label);
            });

            checkButton.style.display = 'inline-block';
            nextButton.style.display = 'none';
        }

        function checkAnswer() {
            const selectedOption = document.querySelector('input[name="answer"]:checked');

            if (!selectedOption) {
                alert("Proszę zaznaczyć odpowiedź!");
                return;
            }

            const isCorrect = selectedOption.value === 'correct';
            const allRadios = optionsElement.querySelectorAll('input[type="radio"]');

            if (isCorrect) {
                score++;
            }

            // Aktualizacja wyniku na bieżąco
            const questionsAnswered = currentQuestionIndex + 1;
            const percentage = Math.round((score / questionsAnswered) * 100);
            liveScoreElement.textContent = `Wynik: ${score}/${questionsAnswered} (${percentage}%)`;

            allRadios.forEach(radio => {
                const parentLabel = radio.parentElement;
                radio.disabled = true;
                
                if (radio.value === 'correct') {
                    parentLabel.style.backgroundColor = '#1b5e20';
                    parentLabel.style.borderColor = '#2e7d32';
                    parentLabel.style.color = '#ffffff'; 
                } else if (radio.checked && radio.value === 'incorrect') {
                    parentLabel.style.backgroundColor = '#b71c1c';
                    parentLabel.style.borderColor = '#c62828';
                    parentLabel.style.color = '#ffffff'; 
                }
            });

            resultElement.style.display = 'block';
            if (isCorrect) {
                resultElement.textContent = "Poprawna odpowiedź!";
                resultElement.className = 'correct-msg';
            } else {
                resultElement.textContent = "Niepoprawna odpowiedź.";
                resultElement.className = 'incorrect-msg';
            }

            checkButton.style.display = 'none';
            nextButton.style.display = 'inline-block';
        }

        function showFinalResult() {
            questionElement.textContent = "Koniec testu!";
            optionsElement.innerHTML = `<div class="final-score">Twój wynik końcowy: ${score} na ${questions.length} punktów.</div>`;
            
            const percentage = Math.round((score / questions.length) * 100);
            optionsElement.innerHTML += `<p>Skuteczność: ${percentage}%</p>`;

            if (percentage >= 80) {
                optionsElement.innerHTML += `<p style="color: #4caf50; font-weight: bold;">Świetny wynik! Gratulacje.</p>`;
            } else if (percentage >= 50) {
                optionsElement.innerHTML += `<p style="color: #ff9800; font-weight: bold;">Nieźle, ale warto powtórzyć materiał.</p>`;
            } else {
                optionsElement.innerHTML += `<p style="color: #f44336; font-weight: bold;">Musisz jeszcze poćwiczyć.</p>`;
            }

            checkButton.style.display = 'none';
            nextButton.style.display = 'none';
            resultElement.textContent = '';
            statusBar.textContent = '';
            liveScoreElement.textContent = ''; // Czyścimy pasek live score na końcu
            
            restartButton.style.display = 'inline-block';
        }

        checkButton.addEventListener('click', checkAnswer);
        nextButton.addEventListener('click', () => {
            currentQuestionIndex++;
            loadNewQuestion();
        });
        restartButton.addEventListener('click', initTest);

        document.addEventListener('DOMContentLoaded', initTest);
    </script>
</body>
</html>
