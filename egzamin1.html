<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - Egzamin Patologie Odżywiania (Live Score)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #121212; /* Ciemne tło */
            color: #e0e0e0; /* Jasny tekst */
        }
        .container {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            max-width: 800px;
            margin: 20px auto;
            border: 1px solid #333;
        }
        h1 {
            color: #f48fb1; /* Różowy odcień pasujący do estetyki */
            text-align: center;
            margin-bottom: 20px;
            font-size: 2em;
        }
        /* --- SEKCJA STATYSTYK --- */
        .stats-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
            font-size: 1.1em;
        }
        .status-bar {
            color: #aaa;
        }
        .live-score {
            font-weight: bold;
            color: #4caf50; /* Zielony kolor dla wyniku */
        }
        
        .question-section {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }
        .question-section p {
            font-size: 1.4em;
            margin-bottom: 20px;
            font-weight: 600;
            line-height: 1.4;
            color: #ffffff;
        }
        .options label {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            cursor: pointer;
            padding: 15px;
            border: 2px solid #333;
            border-radius: 8px;
            transition: all 0.2s ease;
            background-color: #2c2c2c;
            color: #e0e0e0;
        }
        .options label:hover {
            background-color: #383838;
            border-color: #555;
        }
        .options input[type="radio"] {
            margin-right: 15px;
            transform: scale(1.3);
            cursor: pointer;
            accent-color: #f48fb1;
        }
        .button-group {
            text-align: center;
            margin-top: 30px;
        }
        .button-group button {
            padding: 12px 30px;
            margin: 0 10px;
            font-size: 1.1em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.3s;
            font-weight: bold;
        }
        .button-group button:active {
            transform: scale(0.98);
        }
        #check-button {
            background-color: #c2185b;
            color: white;
        }
        #check-button:hover {
            background-color: #ad1457;
        }
        #next-button {
            background-color: #2e7d32;
            color: white;
            display: none;
        }
        #next-button:hover {
            background-color: #1b5e20;
        }
        #result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
            font-size: 1.2em;
            display: none;
        }
        .correct-msg {
            background-color: #1b5e20;
            color: #ffffff;
            border: 1px solid #2e7d32;
        }
        .incorrect-msg {
            background-color: #b71c1c;
            color: #ffffff;
            border: 1px solid #c62828;
        }
        .final-score {
            font-size: 1.5em;
            color: #f48fb1;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Test Wiedzy: Kosmetologia Estetyczna</h1>
        
        <div class="stats-container">
            <div id="status-bar" class="status-bar">Ładowanie...</div>
            <div id="live-score" class="live-score">Wynik: 0/0 (0%)</div>
        </div>
        
        <div class="question-section">
            <p id="question"></p>
            <div class="options" id="options">
                </div>
        </div>

        <div class="button-group">
            <button id="check-button">Sprawdź</button>
            <button id="next-button">Następne pytanie</button>
            <button id="restart-button" style="display: none; background-color: #ff9800; color: white;">Rozpocznij od nowa</button>
        </div>

        <div id="result"></div>
    </div>

    <script>
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        const rawQuestions = [
            {
                question: "Czynnikami, które predysponują do wystąpienia zaburzeń odżywiania (np. anorexia nervosa, bulimia nervosa) są:",

                    { text: "brak tendencji do perfekcjonizmu i/lub niska potrzeba osiągnięć", isCorrect: false },

            },

                question: "Zaburzenia odżywiania mogą powodować:",

                    { text: "uszkodzenia narządów wewnętrznych np. wątroby, trzustki, nerek", isCorrect: false },
                    { text: "defekt metaboliczny jakim jest spowolnienie przemiany materii", isCorrect: false },
                    { text: "zmiany ….. w OUN", isCorrect: false },
                    { text: "odp a i c są prawidłowe", isCorrect: false },
                    { text: "wszystkie odp są prawidłowe", isCorrect: true }
                ]
            },
            {

                    { text: "wyeliminowanie pewnych .. produktów spożywczych np., mięsa", isCorrect: true },
                    { text: "spożywanie gotowych preparatów/ środków specjalnego przeznaczenia żywieniowego, które mają zastępować produkty spożywcze", isCorrect: false },
                    { text: "spożywanie bardzo niskich wartości kalorii w ciągu doby np. 1000kcal", isCorrect: false },
                    { text: "odpowiedzi b i c są prawidłowe", isCorrect: false },
                    { text: "wszystkie odp są prawidłowe", isCorrect: false }
                ]
            },
            {
                question: "Wybierz informacje nt diety dukana, która należy do diet szczególnie niebezpiecznych:",
                options: [
                    { text: "należy znacznie zwiększyć spożycie tłuszczów z równoczesnym ograniczeniem (wykluczeniem) produktów białkowych i węglowodanowych", isCorrect: false },
                    { text: "należy znacznie zwiększyć spożycie białek z równoczesnym ograniczeniem (wykluczeniem) produktów węglowodanowych i tłuszczów", isCorrect: true },
                    { text: "należy znacznie zwiększyć spożycie węglowodanów z równoczesnym ograniczeniem (wykluczeniem) produktów białkowych i tłuszczowych", isCorrect: false }
                ]
            },
            {
                question: "Stosowanie niekonwencjonalnej diety odchudzającej może wiązać się z:",
                options: [
                    { text: "wystąpieniem efektu jo-jo (tj. przerostem masy ciała) po zakończeniu kuracji", isCorrect: false },
                    { text: "wystąpieniem chorób związanych z nieprawidłowym odżywianiem np. niedokrwistość, cukrzyca typu II, miażdżyca, dysfunkcja nerek czy osteoporoza", isCorrect: false },
                    { text: "poprawieniem stanu skóry, wykluczeniem chorób skórnych", isCorrect: false },

                    { text: "wszystkie odp są prawidłowe", isCorrect: false }
                ]
            },
            {
                question: "Stosowanie diety wysokotluszkowej np. Kwaśniewskiego lub Atkinsa może wiązać się z:",
                options: [

                    { text: "poprawą profilu lipidowego krwi", isCorrect: false }, // dodana opcja
                    { text: "obniżeniem poziomu cholesterolu we krwi", isCorrect: false } // dodana opcja

            },
            {
                question: "Stosowanie diet niekonwencjonalnych w których eliminowane są produkty mleczne, może w późniejszym wieku doprowadzić do:",
                options: [
                    { text: "osteoporozy", isCorrect: true },

            {

                options: [
                    { text: "witaminy B12", isCorrect: true },

            {

                options: [
                    { text: "słodycze i wyroby cukiernicze", isCorrect: false }, // dodana opcja

                options: [
                    { text: "regularne spożywanie posiłków", isCorrect: false }, // dodana opcja a

                    { text: "opieranie diety wyłącznie na suplementach", isCorrect: false }, // dodana opcja c

                ]
            },
            {
                question: "Możemy podejrzewać bulimię gdy osoba:",
                options: [
                    { text: "znacznie traci na wadze z powodu głodówek", isCorrect: false }, // dodana opcja a
                    { text: "ma epizody niekontrolowanego objadania się", isCorrect: false }, // dodana opcja b
                    { text: "stosuje zachowania kompensacyjne np. wymioty lub środki przeczyszczające", isCorrect: false }, // dodana opcja c
                    { text: "odp b i c są poprawne", isCorrect: true }
                ]
            },
            {
                question: "Do nieprawidłowych zachowań związanych z jedzeniem należą:",
                options: [
                    { text: "restrykcje kaloryczne i głodówki", isCorrect: false }, // dodana opcja a
                    { text: "kompulsywne objadanie się", isCorrect: false }, // dodana opcja b
                    { text: "picie 2 litrów wody dziennie", isCorrect: false }, // dodana opcja c
                    { text: "odp a i b są prawidłowe", isCorrect: true }
                ]
            },
            {
                question: "W celu poprawy skóry, włosów i paznokci należy:",
                options: [
                    { text: "unikać niedojrzałych owoców", isCorrect: true },
                    { text: "zwiększyć podaż cukrów prostych", isCorrect: false }, // dodana opcja
                    { text: "wyeliminować całkowicie tłuszcze z diety", isCorrect: false } // dodana opcja
                ]
            },
            {
                question: "Wykluczenie z jadłospisu przetworów zbożowych (pieczywo pełnoziarniste i razowe, niełuskany ryż, gruboziarniste kasze czy brązowe makarony) może się wiązać ze zmianami dermatologicznymi które w tym przypadku mogą być konsekwencją:",
                options: [
                    { text: "niedoboru witamin z grupy B", isCorrect: true },
                    { text: "nadmiaru witaminy C", isCorrect: false }, // dodana opcja
                    { text: "przebiałkowania organizmu", isCorrect: false } // dodana opcja
                ]
            },
            {
                question: "Do składników polecanych osobom, które chcą poprawić wygląd włosów i paznokci należą:",
                options: [
                    { text: "krzem", isCorrect: false },
                    { text: "witaminy z grupy b", isCorrect: false },
                    { text: "sód", isCorrect: false },
                    { text: "odpowiedzi a i b są prawidłowe", isCorrect: true },
                    { text: "wszystkie odp są prawidłowe", isCorrect: false }
                ]
            },
            {
                question: "Jakich dodatkowych informacji należy udzielić osobie, której sugeruje się zakup suplementu diety:",
                options: [
                    { text: "suplement diety może zastąpić prawidłowo zbilansowaną dietę", isCorrect: false },
                    { text: "suplement diety najlepiej kupić w aptece", isCorrect: false },
                    { text: "należy kupić kilka suplementów diety o tym samym działaniu, żeby zwiększyć szansę na wystąpienie pożądanego efektu", isCorrect: false },
                    { text: "odpowiedzi a i b są prawidłowe", isCorrect: true },
                    { text: "wszystkie odp są prawidłowe", isCorrect: false }
                ]
            },
            {
                question: "Kobieta spożywa śniadanie o godzinie 5.00, II śniadanie o godzinie 13.00, obiad o godz. 15.00 i kolację o godz. 19.00. Codziennie stara się spożywać różnorodne produkty spożywcze z każdej grupy produktów. Czy można uznać, że kobieta odżywia się prawidłowo:",
                options: [
                    { text: "Tak", isCorrect: false },
                    { text: "Nie", isCorrect: true }
                ]
            },
            {
                question: "Nadmiar białka w diecie wiąże się ze zwiększonym ryzykiem:",
                options: [
                    { text: "wystąpienia osteoporozy", isCorrect: false },
                    { text: "wystąpienia ostrego zapalenia trzustki", isCorrect: false },
                    { text: "rozwojem dny moczanowej", isCorrect: false },
                    { text: "odpowiedzi a i c są prawidłowe", isCorrect: true },
                    { text: "wszystkie odpowiedzi są prawidłowe", isCorrect: false }
                ]
            },
            {
                question: "Prawidłowo zaplanowana racja pokarmowa powinna zawierać:",
                options: [
                    { text: "20-35% CPM z tłuszczu", isCorrect: true },
                    { text: "15-20% CPM z białka", isCorrect: false },
                    { text: "70-80% CPM z węglowodanów", isCorrect: false },
                    { text: "odpowiedzi a i b są prawidłowe", isCorrect: false },
                    { text: "wszystkie odpowiedzi są prawidłowe", isCorrect: false }
                ]
            },
            {
                question: "Dieta śródziemnomorska bazuje na spożyciu:",
                options: [
                    { text: "dużej ilości warzyw i owoców,", isCorrect: false },
                    { text: "kasz, makaronów i pieczywa pełnoziarnistego", isCorrect: false },
                    { text: "tłustych ryb", isCorrect: false },
                    { text: "odpowiedzi A i B są prawidłowe", isCorrect: false },
                    { text: "wszystkie odpowiedzi są prawidłowe", isCorrect: true }
                ]
            },
            {
                question: "Odpowiednie spożycie włókna pokarmowego w diecie jest bardzo ważne, ponieważ:",
                options: [
                    { text: "usuwa zaparcia i zapewnia regularną przemianę materii", isCorrect: false },
                    { text: "obniża poziom cholesterolu i stabilizuje poziom glukozy we krwi", isCorrect: false },
                    { text: "daje uczucie sytości", isCorrect: false },
                    { text: "odpowiedzi A i B są prawidłowe", isCorrect: false },
                    { text: "wszystkie odpowiedzi są prawidłowe", isCorrect: true }
                ]
            },
            {
                question: "W profilaktyce i leczeniu miażdżycy należy ograniczać produkty będące źródłem:",
                options: [
                    { text: "nasyconych kwasów tłuszczowych i tłuszczów trans", isCorrect: false },
                    { text: "cukrów prostych", isCorrect: false },
                    { text: "sodu", isCorrect: false },
                    { text: "odpowiedzi A i C są poprawne", isCorrect: false },
                    { text: "wszystkie odpowiedzi są poprawne", isCorrect: true }
                ]
            },
            {
                question: "Ocena ilościowa jadłospisu polega na :",
                options: [
                    { text: "rodzajach produktów spożywczych", isCorrect: false },
                    { text: "liczbie posiłków w ciągu dnia i przerw między nimi", isCorrect: false },
                    { text: "obliczeniu ilości spożytych z żywnością składników pokarmowych", isCorrect: false },
                    { text: "odpowiedzi A i B są prawidłowe", isCorrect: false },
                    { text: "wszystkie odpowiedzi są poprawne", isCorrect: true } // Zgodnie z formatem pliku źródłowego
                ]
            },
            {
                question: "Do powikłań Anorexia Nervosa należą:",
                options: [
                    { text: "trwałe zmiany ograniczone w OUN", isCorrect: false },
                    { text: "niepłodność i inne dysfunkcje hormonalne", isCorrect: false },
                    { text: "łysienie plackowate i atopowe zapalenie skóry", isCorrect: false },
                    { text: "odpowiedzi A i B są prawidłowe", isCorrect: false },
                    { text: "wszystkie odpowiedzi są prawidłowe", isCorrect: true }
                ]
            }
        ];

        // Zmienne stanu
        let questions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let shuffleNeeded = false; // To change if you want to shuffle the questions

        const questionElement = document.getElementById('question');
        const optionsElement = document.getElementById('options');
        const checkButton = document.getElementById('check-button');
        const nextButton = document.getElementById('next-button');
        const restartButton = document.getElementById('restart-button');
        const resultElement = document.getElementById('result');
        const statusBar = document.getElementById('status-bar');
        const liveScoreElement = document.getElementById('live-score');

        function initTest() {
            // Resetujemy stan
            if (shuffleNeeded) {
                questions = shuffleArray([...rawQuestions]); // Tasujemy pytania
            } else {
                questions = [...rawQuestions];
            }
            currentQuestionIndex = 0;
            score = 0;
            
            // Resetujemy widok
            checkButton.style.display = 'inline-block';
            nextButton.style.display = 'none';
            restartButton.style.display = 'none';
            resultElement.style.display = 'none';
            liveScoreElement.textContent = "Wynik: 0/0 (0%)";
            
            loadNewQuestion();
        }

        function loadNewQuestion() {
            if (currentQuestionIndex >= questions.length) {
                showFinalResult();
                return;
            }

            const currentQuestion = questions[currentQuestionIndex];
            statusBar.textContent = `Pytanie ${currentQuestionIndex + 1} z ${questions.length}`;
            questionElement.textContent = currentQuestion.question;
            optionsElement.innerHTML = '';
            resultElement.style.display = 'none';
            resultElement.className = '';

            const shuffledOptions = shuffleArray([...currentQuestion.options]);

            shuffledOptions.forEach((option, index) => {
                const label = document.createElement('label');
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = 'answer';
                radio.value = option.isCorrect ? 'correct' : 'incorrect';
                
                label.appendChild(radio);
                label.appendChild(document.createTextNode(option.text));
                optionsElement.appendChild(label);
            });

            checkButton.style.display = 'inline-block';
            nextButton.style.display = 'none';
        }

        function checkAnswer() {
            const selectedOption = document.querySelector('input[name="answer"]:checked');

            if (!selectedOption) {
                alert("Proszę zaznaczyć odpowiedź!");
                return;
            }

            const isCorrect = selectedOption.value === 'correct';
            const allRadios = optionsElement.querySelectorAll('input[type="radio"]');

            if (isCorrect) {
                score++;
            }

            // Aktualizacja wyniku na bieżąco
            const questionsAnswered = currentQuestionIndex + 1;
            const percentage = Math.round((score / questionsAnswered) * 100);
            liveScoreElement.textContent = `Wynik: ${score}/${questionsAnswered} (${percentage}%)`;

            allRadios.forEach(radio => {
                const parentLabel = radio.parentElement;
                radio.disabled = true;
                
                if (radio.value === 'correct') {
                    parentLabel.style.backgroundColor = '#1b5e20';
                    parentLabel.style.borderColor = '#2e7d32';
                    parentLabel.style.color = '#ffffff'; 
                } else if (radio.checked && radio.value === 'incorrect') {
                    parentLabel.style.backgroundColor = '#b71c1c';
                    parentLabel.style.borderColor = '#c62828';
                    parentLabel.style.color = '#ffffff'; 
                }
            });

            resultElement.style.display = 'block';
            if (isCorrect) {
                resultElement.textContent = "Poprawna odpowiedź!";
                resultElement.className = 'correct-msg';
            } else {
                resultElement.textContent = "Niepoprawna odpowiedź.";
                resultElement.className = 'incorrect-msg';
            }

            checkButton.style.display = 'none';
            nextButton.style.display = 'inline-block';
        }

        function showFinalResult() {
            questionElement.textContent = "Koniec testu!";
            optionsElement.innerHTML = `<div class="final-score">Twój wynik końcowy: ${score} na ${questions.length} punktów.</div>`;
            
            const percentage = Math.round((score / questions.length) * 100);
            optionsElement.innerHTML += `<p>Skuteczność: ${percentage}%</p>`;

            if (percentage >= 80) {
                optionsElement.innerHTML += `<p style="color: #4caf50; font-weight: bold;">Świetny wynik! Gratulacje.</p>`;
            } else if (percentage >= 50) {
                optionsElement.innerHTML += `<p style="color: #ff9800; font-weight: bold;">Nieźle, ale warto powtórzyć materiał.</p>`;
            } else {
                optionsElement.innerHTML += `<p style="color: #f44336; font-weight: bold;">Musisz jeszcze poćwiczyć.</p>`;
            }

            checkButton.style.display = 'none';
            nextButton.style.display = 'none';
            resultElement.textContent = '';
            statusBar.textContent = '';
            liveScoreElement.textContent = ''; // Czyścimy pasek live score na końcu
            
            restartButton.style.display = 'inline-block';
        }

        checkButton.addEventListener('click', checkAnswer);
        nextButton.addEventListener('click', () => {
            currentQuestionIndex++;
            loadNewQuestion();
        });
        restartButton.addEventListener('click', initTest);

        document.addEventListener('DOMContentLoaded', initTest);
    </script>
</body>
